version: "3.9"

services:

  backend:
    build: ./backend
    container_name: laravel_app
    networks:
      - appnet
    volumes:
      - ./backend:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    networks:
      - appnet
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build: ./frontend
    container_name: vue_app
    networks:
      - appnet
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: [ "sh", "-c", "npm install && npm run dev" ]

  db:
    image: postgres:15
    container_name: pgsql_db
    networks:
      - appnet
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgintr_admin
    networks:
      - appnet
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5058:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
networks:
  appnet:
    driver: bridge
